services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: kb_user
      POSTGRES_PASSWORD: kb_password
      POSTGRES_DB: knowledgebase
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kb_user -d knowledgebase"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://kb_user:kb_password@db:5432/knowledgebase
      STORAGE_DIR: /app/storage
      # LLM (OpenRouter)
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-sk-placeholder}
      LLM_API_URL: ${LLM_API_URL:-https://openrouter.ai/api/v1/chat/completions}
      LLM_MODEL: ${LLM_MODEL:-openai/gpt-4o-mini}
      # Embedding (separate provider)
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_API_URL: ${EMBEDDING_API_URL:-https://api.openai.com/v1/embeddings}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-ada-002}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1536}
    volumes:
      - ./storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
      "

volumes:
  pgdata:
